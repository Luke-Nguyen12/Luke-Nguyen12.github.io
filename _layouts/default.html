<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>
      {% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}
    </title>
    <meta name="description" content="{{ site.description | default: site.title }}" />
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <a class="skip-link" href="#content">Skip to content</a>

    <div class="site">
      <aside class="sidebar">
        <div class="sidebar__inner">
          <div class="identity">
            <div class="sidebar-photo">
              <img
                src="{{ '/assets/img/PC210029.JPG' | relative_url }}"
                alt="Photo of Luke Nguyen"
                loading="eager"
              />
            </div>
            <a class="identity__name" href="{{ '/' | relative_url }}">Luke Nguyen</a>
            <p class="identity__role">Undergraduate Computer Engineering</p>
            <p class="identity__blurb">I love challening myself to be a better version of me</p>
          </div>

          <nav class="nav" aria-label="Primary">
            <ul class="nav__list">
              <li class="nav__item"><a class="nav__link" href="{{ '/' | relative_url }}#about">About</a></li>
              <li class="nav__item"><a class="nav__link" href="{{ '/' | relative_url }}#experience">Experience</a></li>
              <li class="nav__item"><a class="nav__link" href="{{ '/' | relative_url }}#projects">Projects</a></li>
              <li class="nav__item"><a class="nav__link" href="{{ '/' | relative_url }}#education">Education</a></li>
            </ul>
          </nav>

          <div class="contact">
            <div class="email-row">
              <a class="contact__email" href="mailto:lukenguyen@ucsb.edu">lukenguyen@ucsb.edu</a>
              <button class="copy-button" type="button" data-copy="lukenguyen@ucsb.edu" aria-label="Copy email" title="Copy email">
                <svg viewBox="0 0 24 24" role="img" aria-hidden="true">
                  <path
                    fill="currentColor"
                    d="M16 1H6a2 2 0 0 0-2 2v12h2V3h10V1Zm3 4H10a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h9a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2Zm0 16H10V7h9v14Z"
                  />
                </svg>
              </button>
            </div>
            <div class="icon-links" aria-label="Social links">
              <a
                class="icon-link"
                href="https://github.com/Luke-Nguyen12"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="GitHub"
                title="GitHub"
              >
                <svg viewBox="0 0 24 24" role="img" aria-hidden="true">
                  <path
                    fill="currentColor"
                    d="M12 2c-5.52 0-10 4.58-10 10.23 0 4.52 2.87 8.35 6.84 9.7.5.1.68-.22.68-.48 0-.24-.01-.87-.01-1.7-2.78.62-3.37-1.36-3.37-1.36-.45-1.17-1.11-1.48-1.11-1.48-.91-.64.07-.63.07-.63 1 .07 1.53 1.06 1.53 1.06.9 1.57 2.36 1.12 2.93.86.09-.67.35-1.12.63-1.37-2.22-.26-4.56-1.13-4.56-5.04 0-1.11.38-2.02 1.01-2.74-.1-.26-.44-1.31.1-2.73 0 0 .83-.27 2.72 1.05a9.2 9.2 0 0 1 2.48-.34c.84 0 1.69.12 2.48.34 1.88-1.32 2.71-1.05 2.71-1.05.54 1.42.2 2.47.1 2.73.63.72 1.01 1.63 1.01 2.74 0 3.92-2.34 4.78-4.58 5.03.36.32.68.95.68 1.92 0 1.38-.01 2.49-.01 2.83 0 .26.18.59.69.48A10.27 10.27 0 0 0 22 12.23C22 6.58 17.52 2 12 2Z"
                  />
                </svg>
              </a>
              <a
                class="icon-link"
                href="https://www.linkedin.com/in/luke-anh-nguyen/"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="LinkedIn"
                title="LinkedIn"
              >
                <svg viewBox="0 0 24 24" role="img" aria-hidden="true">
                  <path
                    fill="currentColor"
                    d="M20.45 20.45h-3.55v-5.57c0-1.33-.03-3.05-1.86-3.05-1.86 0-2.15 1.45-2.15 2.95v5.67H9.34V9h3.41v1.56h.05c.48-.9 1.64-1.86 3.37-1.86 3.6 0 4.26 2.37 4.26 5.45v6.3ZM5.34 7.43a2.06 2.06 0 1 1 0-4.12 2.06 2.06 0 0 1 0 4.12ZM7.12 20.45H3.56V9h3.56v11.45ZM22.23 2H1.77C.79 2 0 2.77 0 3.72v16.55C0 21.23.79 22 1.77 22h20.45c.98 0 1.78-.77 1.78-1.73V3.72C24 2.77 23.21 2 22.23 2Z"
                  />
                </svg>
              </a>
            </div>
          </div>
        </div>
      </aside>

      <main id="content" class="content">
        {{ content }}
      </main>
    </div>

    <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
  </body>
</html>
